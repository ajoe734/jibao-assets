<!DOCTYPE html>
<html lang="zh-Hant" style="background:#111;height:100%;margin:0;padding:0;overflow:hidden">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>集寶 · 我的資產</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
  html, body { background: #111; font-family: 'PingFang TC', -apple-system, 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif; }
  body { overflow: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  .app-shell-mobile {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    inset: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: #111;
  }
  button { font-family: inherit; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  /* visible-on-failure marker: red text shown until React replaces #root */
  #boot-marker { position:fixed; inset:0; background:#111; color:#fff; font:14px monospace; padding:60px 16px 16px; z-index:1; }
  #boot-marker.gone { display:none; }
</style>
</head>
<body style="background:#111;color:#fff;margin:0;padding:0">
<div id="boot-marker">
  <div id="boot-status">boot…</div>
  <div id="boot-errors" style="color:#f88; white-space:pre-wrap; margin-top:8px"></div>
</div>
<div id="root"></div>
<script>
  // capture any error so we can SEE it even in PWA standalone
  (function(){
    var bs = document.getElementById('boot-status');
    var be = document.getElementById('boot-errors');
    function log(msg){ if(bs) bs.textContent = msg; }
    function err(e){
      if (be) be.textContent += '\n' + (e?.message || e) + (e?.filename ? ' @ ' + e.filename : '');
    }
    window.addEventListener('error', function(e){ err(e); });
    window.addEventListener('unhandledrejection', function(e){ err(e.reason); });
    window.__bootLog = log;
    log('html parsed');
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" onerror="__bootLog('react FAILED to load')" onload="__bootLog('react loaded')"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" onerror="__bootLog('react-dom FAILED to load')" onload="__bootLog('react-dom loaded')"></script>
<script src="ios-frame.compiled.js" onerror="__bootLog('ios-frame FAILED to load')" onload="__bootLog('ios-frame loaded')"></script>
<script src="app.compiled.js" onerror="__bootLog('app FAILED to load')" onload="
  __bootLog('app loaded, mounting…');
  setTimeout(function(){
    var marker = document.getElementById('boot-marker');
    if (marker && document.querySelector('#root')?.children.length > 0) marker.classList.add('gone');
  }, 50);
"></script>
</body>
</html>
