<!DOCTYPE html>
<html lang="zh-Hant" style="background:#111;color:#fff;height:100%;margin:0;padding:0">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>集寶 · 我的資產</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { width:100%; height:100%; margin:0; padding:0; }
  html, body { background:#111; color:#fff; font-family:'PingFang TC', -apple-system, 'Noto Sans TC', system-ui, sans-serif; }
  body { overflow:hidden; }
  *, *::before, *::after { box-sizing:border-box; }
  .app-shell-mobile { position:fixed; top:0; right:0; bottom:0; left:0; inset:0; width:100%; height:100vh; height:100dvh; overflow:hidden; background:#111; }
  button { font-family:inherit; }
  *::-webkit-scrollbar { width:0; height:0; }
</style>
</head>
<body style="background:#111;color:#fff;margin:0;padding:0;min-height:100vh">
<!-- Plain black splash that React replaces. Kept inline so iOS PWA can't lose the bg color before React mounts. -->
<div id="boot" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#111;z-index:1"></div>
<div id="root"></div>
<script>
  // Silent error capture — if anything fails we at least keep the splash visible (not white).
  window.addEventListener('error', function(){});
  window.addEventListener('unhandledrejection', function(){});
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="ios-frame.compiled.js"></script>
<script src="app.compiled.js" onload="
  setTimeout(function(){
    var b = document.getElementById('boot');
    var r = document.getElementById('root');
    if (b && r && r.children.length > 0) b.style.display='none';
  }, 50);
"></script>
</body>
</html>
